name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # conformance vectors live in the c0-spec submodule
      - name: Conformance header is in sync with the vectors
        run: make gen && git diff --exit-status tests/vectors_gen.h
      - name: Test
        run: make test
